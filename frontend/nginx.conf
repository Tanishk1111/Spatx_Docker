server {
    listen 8080;
    server_name _;

    client_max_body_size 2G;

    # ── Serve the SPA ──
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy every backend route ──
    # All API traffic goes to the "backend" container on port 9001.
    # The browser never talks to port 9001 directly → no CORS issues.

    location /auth/       { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
    location /upload/     { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; proxy_read_timeout 600s; }
    location /uploads/    { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; proxy_read_timeout 600s; }
    location /predict     { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; proxy_read_timeout 600s; }
    location /train/      { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; proxy_read_timeout 600s; }
    location /pratyaksha/ { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; proxy_read_timeout 600s; }
    location /pratyaksha_tiles/ { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
    location /genes       { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
    location /models      { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
    location /user/       { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
    location /users/      { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
    location /health      { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
    location /docs        { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
    location /openapi.json { proxy_pass http://backend:9001; include /etc/nginx/proxy_params; }
}
